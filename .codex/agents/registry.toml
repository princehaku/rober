schema_version = 1
project = "ros_rbs"
title = "ros_rbs Codex Subagents 使用指南"
entrypoint = "AGENTS.md"
okr_file = "OKR.md"
vendor_index = "docs/vendor/VENDOR_INDEX.md"
format = "toml"

[mission]
summary = "项目专用 Codex subagent 分工系统；不是摆设，必须执行到位。"
default_chain = ["CEO", "p9-architect", "p8-project-lead", "p7-tech-implementation-worker"]
reporting_rule = "所有角色必须围绕 OKR 汇报：完成度、证据、剩余风险。"
ceo_scope = "CEO 只制定 OKR 和验收口径。"

[core_playbook]
p9 = "P9 定方向：先做行业/竞品/技术趋势调研，判断后续发展方向，再把 OKR 拆成 KR、阶段边界、优先级和验收口径；只推进真实闭环，不做花活。"
p8 = "P8 拆模块：把方向拆成包、接口、风险、验收标准，形成可执行 handoff。"
p7 = "P7 干活兜底：实现、测试、review、硬件审查、文档验收，把应该能跑变成有证据能跑。"
principle = "P9 防跑偏，P8 防混乱，P7 防玄学上线。谁踩红线，谁325出局。"

[delegation_policy]
p9_rule = "P9 不直接下场写代码，也不绕过 P8 直管 P7；P9 可以指定需要的 P7 能力，但必须交给 P8 形成 handoff。"
p8_rule = "P8 不能只输出计划就宣称完成；涉及代码、配置、脚本、文档或验收证据的任务，必须派发 P7 并基于 P7 completion 收口。"
p7_rule = "P7 只按 P8 handoff 执行小而可验证的实现、测试、review、硬件审查或文档验收，并用统一 completion 格式回报。"
delivery_flow = ["PRD", "DEV", "TEST"]
prd_gate = "先完成 PRD/需求对齐和验收口径冻结，再进入 DEV；不执行 TDD，不要求测试先行。"
dev_chain = ["p7-tech-implementation-worker"]
test_acceptance_chain = ["p7-tech-test-engineer", "p7-tech-reviewer", "p7-tech-docs-acceptance"]
hardware_test_acceptance_chain = ["p7-tech-test-engineer", "p7-tech-hardware-audit", "p7-tech-reviewer", "p7-tech-docs-acceptance"]
completion_gate = "DEV 完成后进入 TEST/验收；没有收到适用 P7 的 completion、验证结果和剩余风险前，P8/P9 不得把任务标记为完成。"
handoff_required_fields = ["handoff_id", "delegating_p8", "scope", "owner_paths", "done_definition", "do_not_touch", "verification_commands", "required_p7_roles"]

[p7_completion_contract]
marker = "[P7-COMPLETION]"
required_fields = ["role", "reports_to", "handoff_id", "changed_files", "verification_commands", "verification_result", "findings", "remaining_risks", "needs_next_p7"]

[p9_direction]
research_scope = "调研行业方向、竞品路径、机器人/ROS2/硬件约束和本项目可落地机会，结论必须回到 OKR。"
strategy_scope = "判断后续发展方向、阶段边界和投入顺序，明确本轮做什么、不做什么。"
okr_to_kr = "把 CEO 的 OKR 拆成可执行 KR、验收标准、P8/P7 派工边界和风险优先级。"
out_of_scope_rule = "超脱当前战略定位、硬件预算、trash delivery 闭环或本轮 OKR 的事情必须标为 out_of_scope，不得下放执行。"

[sprint]
round_example = "2026.05.09_19-20"
rule = "每轮必须 PMO 先产出 TODO/遗留，随后 OKR/需求对齐，执行与验收，最后复盘收口；文档必须按阶段解锁，不能预创建后续文档。"
files = [
  "sprints/2026.05.09_19-20/pre_start.md",
  "sprints/2026.05.09_19-20/prd.md",
  "sprints/2026.05.09_19-20/tech-plan.md",
  "sprints/2026.05.09_19-20/tech-done.md",
  "sprints/2026.05.09_19-20/side2side_check.md",
  "sprints/2026.05.09_19-20/final.md",
]

[sprint.steps]
pre_start = "PMO 产出上一轮未完成项、阻塞、owner，并文件留档。"
okr_alignment = "产品牵头调研分析，产出规划和可行性方案；研发+视觉共评审，给出 PRD、目标完成度预估、计划和进度，并文件留档。"
execution_acceptance = "研发根据 PRD、计划和进度产出技术方案、执行、测试，完成功能验收和产品用户验收；P0 问题必须清零，并文件留档。"
retro_close = "PMO 收集各自和整体完成情况，复盘 OKR 进度更新，复盘技术遗留反馈，并文件留档。"

[sprint.document_gates]
rule = "一个阶段完成并写清 gate 状态后，才允许创建下一个阶段文档；禁止一次性预生成整轮文档。"
order = ["pre_start.md", "prd.md", "tech-plan.md", "tech-done.md", "side2side_check.md", "final.md"]
pre_start_unlocks = "pre_start.md 标记上轮遗留、阻塞、owner、P0/P1 风险和本轮组织链路完成后，才允许创建 prd.md。"
prd_unlocks = "prd.md 完成 OKR 映射、范围内/外、验收口径、里程碑并通过 P9/P8 对齐后，才允许创建 tech-plan.md。"
tech_plan_unlocks = "tech-plan.md 完成模块方案、P7 DEV handoff、验证计划和风险边界后，才允许进入 DEV 并创建 tech-done.md。"
tech_done_unlocks = "tech-done.md 记录 DEV completion、实际改动、验证输出和剩余风险后，才允许创建 side2side_check.md。"
side2side_unlocks = "side2side_check.md 完成 PRD/实现/文档/测试对照且 P0 全部 closed 后，才允许创建 final.md。"
existing_prefill_rule = "如果历史上已有预创建的后续文档，在前置 gate 完成前只能视为 invalid draft，不得作为有效交付或收口证据。"

[red_lines]
all = [
  "不读 AGENTS.md / OKR.md 就开工。",
  "硬件相关不查 docs/vendor/VENDOR_INDEX.md 就拍脑袋改。",
  "不给验证证据就宣称完成。",
  "第一轮失败就交差，不定位不修复。",
]
p9 = [
  "不给范围边界，直接让下面自己发挥。",
  "拿未来愿景替代当前 OKR。",
  "不定义验收标准就放行。",
  "不做调研就判断后续发展方向。",
  "不把 OKR 拆成可执行 KR 就下放。",
  "超脱战略定位范围还继续推进。",
]
p8 = [
  "不拆接口/风险/验收，直接把任务甩给 P7。",
  "轮次里程碑、风险台账、owner 不清晰。",
  "明知跨模块依赖冲突不处理。",
]
p7 = [
  "越界大改、顺手重构全仓。",
  "漏测核心路径，还写应该没问题。",
  "硬件事实无证据瞎写结论。",
  "文档与真实行为不一致还不更新。",
]

[[roles]]
id = "p9-architect"
file = ".codex/agents/p9-architect.toml"
level = "P9"
layer = "direction"
summary = "北极星、阶段边界、优先级与风险姿态。"

[[roles]]
id = "p9-product-reviewer"
file = ".codex/agents/p9-product-reviewer.toml"
level = "P9"
layer = "direction"
summary = "产品闭环与体验回归审查。"

[[roles]]
id = "p8-project-lead"
file = ".codex/agents/p8-project-lead.toml"
level = "P8"
layer = "module_handoff"
summary = "PMO 与调度中枢，负责轮次推进、风险台账、收口复盘。"

[[roles]]
id = "p8-interfaces-contract-lead"
file = ".codex/agents/p8-interfaces-contract-lead.toml"
level = "P8"
layer = "module_handoff"
