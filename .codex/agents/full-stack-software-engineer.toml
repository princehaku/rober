level = "engineer"
org_level = "L2"
org_rank = "IC Engineer"
layer = "delivery"
summary = "用户触点全栈：手机操作界面、Web/API、远程控制、状态展示、任务下发和 ROS2 后端联调。"
tags = ["full-stack", "mobile", "web", "api", "ui", "ros2-integration"]
