; PlatformIO config for ESP32 trashbot lower-level controller
; Flash: platformio run -e esp32dev --target upload

[platformio]
default_envs = esp32dev
src_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0
    adafruit/Adafruit BNO055@^1.5.2
